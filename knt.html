<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>icon</title>
  <script src="https://kit.fontawesome.com/c74e1cfdbb.js" crossorigin="anonymous"></script>
  <style>
    body {
      background: #111;
      color: white;
      text-align: center;
      font-family: sans-serif;
      padding: 40px;
    }
    i {
      font-size: 3rem;
      margin: 5px;
      transition: transform 0.3s ease, color 0.3s ease;
    }
    i:hover {
      transform: scale(1.3);
      color: gold;
    }
    .kent  { color: #3498db; }      
    .jefferson  { color: #2ecc71; } 
    .salamillas  { color: #e74c3c; } 
    .calma  { color: #f39c12; }      
  </style>
</head>
<body>


 
  <div class="kent">
    <i class="fa-solid fa-k"></i>
    <i class="fa-brands fa-etsy"></i>
    <i class="fa-brands fa-neos"></i>
   <i class="fa-solid fa-tenge-sign"></i>
  </div>
  <br>


  <div class="jefferson">
    <i class="fa-solid fa-j"></i>
    <i class="fa-solid fa-euro-sign"></i>
    <i class="fa-brands fa-facebook-f"></i>
    <i class="fa-brands fa-facebook-f"></i>
    <i class="fa-solid fa-e"></i>
    <i class="fa-solid fa-r"></i>
    <i class="fa-solid fa-section"></i>
    <i class="fa-brands fa-opera"></i>
    <i class="fa-brands fa-notion"></i>
  </div>
  <br>


  <div class="salamillas">
    <i class="fa-solid fa-s"></i>
    <i class="fa-solid fa-a"></i>
    <i class="fa-solid fa-l"></i>
    <i class="fa-brands fa-adn"></i>
    <i class="fa-solid fa-m"></i>
    <i class="fa-solid fa-i-cursor"></i>
    <i class="fa-solid fa-l"></i>
    <i class="fa-solid fa-l"></i>
    <i class="fa-brands fa-accusoft"></i>
    <i class="fa-solid fa-s"></i>
  </div>
  <br>

  <div class="calma">
    <i class="fa-solid fa-c"></i>
    <i class="fa-brands fa-autoprefixer"></i>
    <i class="fa-solid fa-l"></i>
    <i class="fa-brands fa-maxcdn"></i>
    <i class="fa-solid fa-a"></i>
  </div>

</body>
</html>
